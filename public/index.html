<!DOCTYPE html>
<html>
<head>
<title>Huntrix SaaS Dashboard</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b1220;
    color: white;
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: #0f172a;
    padding: 20px;
    border-right: 1px solid #1f2937;
}

.sidebar h2 {
    color: #22d3ee;
}

.sidebar button {
    width: 100%;
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    background: #111827;
    border: 1px solid #1f2937;
    color: white;
    cursor: pointer;
}

.sidebar button:hover {
    background: #22d3ee;
    color: black;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* TOP */
.top {
    display: flex;
    justify-content: space-between;
}

/* CARD */
.card {
    background: #0f172a;
    border: 1px solid #1f2937;
    padding: 15px;
    margin: 12px 0;
    border-radius: 12px;
}

/* INPUT */
input {
    width: 70%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #0b1220;
    color: white;
}

button.run {
    padding: 10px 15px;
    background: #22d3ee;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

/* LEADERBOARD BAR */
.bar {
    height: 6px;
    background: #1f2937;
    border-radius: 10px;
}

.fill {
    height: 100%;
    background: linear-gradient(90deg,#22d3ee,#9333ea);
}

/* WINNER */
.winner {
    color: #fbbf24;
}

/* ERROR */
.error {
    color: #f87171;
}
</style>

<script>
async function runAnalysis() {
    const video = document.querySelector("input").value;

    const res = await fetch("/api/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ video_id: video })
    });

    const data = await res.json();

    // ---------------- ERROR ----------------
    document.getElementById("error").innerText =
        data.error ? "⚠ " + data.error : "";

    // ---------------- STATS ----------------
    if (data.stats) {
        document.getElementById("stats").innerHTML = `
            <b>Total Comments:</b> ${data.stats.total}<br>
            <b>Users:</b> ${data.stats.users}
        `;
    }

    // ---------------- WINNER ----------------
    if (data.winner) {
        document.getElementById("winner").innerHTML = `
            <b>${data.winner.author}</b><br>
            👍 ${data.winner.likes}<br><br>
            ${data.winner.text}
        `;
    } else {
        document.getElementById("winner").innerText = "No winner yet";
    }

    // ---------------- LEADERBOARD ----------------
    let html = "";

    if (data.leaderboard && data.leaderboard.length > 0) {
        let max = data.leaderboard[0][1];

        data.leaderboard.forEach(([name, score]) => {
            let p = Math.floor((score / max) * 100);

            html += `
                <div style="margin:10px 0;">
                    <b>${name}</b> — ${score}
                    <div class="bar">
                        <div class="fill" style="width:${p}%"></div>
                    </div>
                </div>
            `;
        });
    } else {
        html = "No data";
    }

    document.getElementById("leaderboard").innerHTML = html;
}
</script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🔥 Huntrix SaaS</h2>
    <button>📊 Dashboard</button>
    <button>📈 Analytics</button>
    <button>⚙ Settings</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="top">
    <h2>YouTube Intelligence</h2>
</div>

<!-- INPUT -->
<div class="card">
    <input placeholder="Paste YouTube URL or ID">
    <button class="run" onclick="runAnalysis()">Analyze</button>
</div>

<!-- ERROR -->
<div class="card error" id="error"></div>

<!-- STATS -->
<div class="card" id="stats"></div>

<!-- WINNER -->
<div class="card">
    <h3>🏆 Top Comment</h3>
    <div id="winner"></div>
</div>

<!-- LEADERBOARD -->
<div class="card">
    <h3>📊 Leaderboard</h3>
    <div id="leaderboard"></div>
</div>

</div>

</body>
</html>
