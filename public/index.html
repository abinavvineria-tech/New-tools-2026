<!DOCTYPE html>
<html>
<head>
<title>Huntrix SaaS Pro</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b1220;
    color: white;
    display: flex;
    height: 100vh;
}

/* 🔥 FULL SIDEBAR FIX */
.sidebar {
    width: 280px;
    height: 100vh;
    background: #0f172a;
    border-right: 1px solid #1f2937;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.sidebar h2 {
    color: #22d3ee;
    margin-bottom: 20px;
}

/* BIG SAAS BUTTONS */
.sidebar button {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
    background: #111827;
    color: white;
    font-size: 15px;
    cursor: pointer;
    text-align: left;
    transition: 0.2s;
}

.sidebar button:hover {
    background: #22d3ee;
    color: black;
    transform: translateX(5px);
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* TOP */
.top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

/* CARD */
.card {
    background: #0f172a;
    border: 1px solid #1f2937;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 12px;
}

/* INPUT */
input {
    width: 70%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #0b1220;
    color: white;
}

button.run {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #22d3ee;
    font-weight: bold;
    cursor: pointer;
}

/* BAR */
.bar {
    height: 6px;
    background: #1f2937;
    border-radius: 10px;
}

.fill {
    height: 100%;
    background: linear-gradient(90deg,#22d3ee,#9333ea);
}

/* TABS */
.tab { display: none; }
.active { display: block; }

.error { color: #f87171; }
</style>

<script>
function show(tab){
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tab).classList.add("active");
}

async function runAnalysis(){
    const video = document.getElementById("video").value;

    const res = await fetch("/api/run", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({video_id: video})
    });

    const data = await res.json();

    document.getElementById("error").innerText =
        data.error ? "⚠ " + data.error : "";

    document.getElementById("stats").innerHTML = `
        <b>Total Comments:</b> ${data.stats?.total || 0}<br>
        <b>Users:</b> ${data.stats?.users || 0}
    `;

    document.getElementById("winner").innerHTML = data.winner ?
        `<b>${data.winner.author}</b><br>👍 ${data.winner.likes}<br>${data.winner.text}`
        : "No data";

    let html = "";

    if(data.leaderboard){
        let max = data.leaderboard[0][1];

        data.leaderboard.forEach(([n,s])=>{
            let p = Math.floor((s/max)*100);

            html += `
                <div style="margin:10px 0;">
                    <b>${n}</b> — ${s}
                    <div class="bar">
                        <div class="fill" style="width:${p}%"></div>
                    </div>
                </div>
            `;
        });
    }

    document.getElementById("leaderboard").innerHTML = html;
}
</script>

</head>

<body>

<!-- 🔥 SIDEBAR (FIXED BIG SAAS MENU) -->
<div class="sidebar">
    <h2>🔥 Huntrix SaaS</h2>

    <button onclick="show('dashboard')">🏠 Dashboard</button>
    <button onclick="show('analytics')">📊 Analytics</button>
    <button onclick="show('settings')">⚙ Settings</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="tab active">

<div class="card">
    <input id="video" placeholder="YouTube URL or ID">
    <button class="run" onclick="runAnalysis()">Analyze</button>
</div>

<div class="card error" id="error"></div>

<div class="card" id="stats"></div>

<div class="card">
    <h3>🏆 Top Comment</h3>
    <div id="winner"></div>
</div>

<div class="card">
    <h3>📊 Leaderboard</h3>
    <div id="leaderboard"></div>
</div>

</div>

<!-- ANALYTICS -->
<div id="analytics" class="tab">
    <div class="card">
        <h3>📊 Analytics</h3>
        <p>SaaS analytics panel active.</p>
    </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="tab">
    <div class="card">
        <h3>⚙ Settings</h3>
        <p>UI settings panel.</p>
    </div>
</div>

</div>

</body>
</html>
